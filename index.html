<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olivia Nneka Anigbogu — SEN 482</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      background: #f0f2f5;
      color: #202124;
      padding: 20px;
    }

    .card {
      max-width: 420px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    }

    .name {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .course {
      font-size: 0.8rem;
      color: #999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 4px;
      margin-bottom: 24px;
    }

    .desc {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #444;
      margin-bottom: 28px;
    }

    .desc strong {
      color: #1a73e8;
    }

    .btn-calc {
      display: inline-block;
      background: #1a73e8;
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 12px;
      transition: background 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 20px rgba(26,115,232,0.25);
    }

    .btn-calc:hover {
      background: #1557b0;
      box-shadow: 0 6px 24px rgba(26,115,232,0.35);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="name">Olivia Nneka Anigbogu </div>
  
  

    <p class="desc">
      Welcome! This site demonstrates a complete CI/CD pipeline —
      from automated linting and testing, through Docker containerisation,
      to live deployment. The pipeline's deliverable is a calculator
      featuring a <strong>prime number checker</strong> as its unique function.
    </p>

    <a href="/calculator/" class="btn-calc">Open Calculator →</a>
  </div>

</body>
</html>
